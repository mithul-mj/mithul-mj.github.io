<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Episode Audio Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .outer-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 90vw;
      height: 80%;
    }

    .container {
      display: flex;
      min-width: 1000px;
      height: 100%;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .episode-list {
      width: 40%;
      background-color: #f9f9f9;
      overflow-y: auto;
      border-right: 1px solid #ddd;
      padding: 20px;
      height: 100%;
    }

    .episode-list h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .episode {
      padding: 15px;
      background-color: #ececec;
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .episode:hover {
      background-color: #ddd;
    }

    .audio-player {
      width: 60%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .story_image_div {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 300px;
      margin-bottom: 10px;
      background-color: #fcf1f1;
      border-radius: 10px;
      overflow: hidden;
    }

    .story_image {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    .audio-player h3 {
      margin: 20px 0;
    }

    .audio-player audio {
      display: none;
    }

    .play-pause-button {
      width: 50px;
      height: 50px;
      background-color: #000000;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .play-pause-button:focus {
      outline: none;
    }

    .seek-bar {
      width: 60%;
      margin: 10px 0;
    }

    .seek-bar input {
      width: 100%;
      -webkit-appearance: none;
      background: #050505;
      height: 5px;
      border-radius: 5px;
      outline: none;
    }

    .seek-bar input::-webkit-slider-thumb {
      -webkit-appearance: none;
      background: #4d77d9;
      height: 15px;
      width: 15px;
      border-radius: 50%;
      cursor: pointer;
    }

    .episode-list::-webkit-scrollbar {
      width: 8px;
    }

    .episode-list::-webkit-scrollbar-thumb {
      background: #4CAF50;
      border-radius: 10px;
    }

    .episode-list::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
  </style>
</head>
<body>

  <div class="outer-container">
    <div class="container">
      <div class="episode-list">
        <h2 id="story-title">Episodes</h2>
        <!-- Dynamic episodes will be inserted here -->
      </div>

      <div class="audio-player">
        <div class="story_image_div">
          <img class="story_image" src="https://raw.githubusercontent.com/mithul-mj/mithul-mj.github.io/6ad2ba73dbe475d661917d2e361058c793731f35/Whispers_of_the_Haunted_Manison/img.jpeg" alt="Episode Image">
        </div>
        <h6 id="episode-title">Select an Episode</h6>
        <audio id="audio-player">
          <source id="audio-source" src="" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <button class="play-pause-button" id="playPauseBtn"><i class="fa-solid fa-play"></i></button>
        <div class="seek-bar">
          <input type="range" id="seekBar" value="0" step="1" min="0" max="100" />
        </div>
      </div>
    </div>
  </div>

  <script>
    var currentEpisodeIndex = 0;
    var baseGitHubUrl = 'https://raw.githubusercontent.com/mithul-mj/mithul-mj.github.io/6faa40ca8b517d639bb7ce463940df9a5a4be224/'; // Base raw URL to your repository
    var folderPath = 'Whispers_of_the_Haunted_Manison'; // Example folder name
    var episodeCount = 4; // Number of episodes (MP3 files)

    // Extract and set the folder name as the story title
    var storyTitle = folderPath.replace(/_/g, ' '); // Replace underscores with spaces
    document.getElementById('story-title').textContent = storyTitle;

    // Generate the episode list dynamically (displaying in ascending order)
    var episodeListElement = document.querySelector('.episode-list');
    for (var i = 1; i <= episodeCount; i++) { // Display episodes in ascending order
      var episodeDiv = document.createElement('div');
      episodeDiv.classList.add('episode');
      episodeDiv.textContent = 'Episode ' + i; // Display the episodes as Episode 1, Episode 2, etc.
      episodeDiv.setAttribute('onclick', `playAudio('${baseGitHubUrl}${folderPath}/${(episodeCount - i + 1)}.mp3', 'Episode ${i}', ${episodeCount - i})`);
      episodeListElement.appendChild(episodeDiv);
    }

    var audioPlayer = document.getElementById('audio-player');
    var audioSource = document.getElementById('audio-source');
    var episodeTitleElement = document.getElementById('episode-title');
    var seekBar = document.getElementById('seekBar');
    var playPauseBtn = document.getElementById('playPauseBtn');

    function playAudio(audioFile, episodeTitle, index) {
      currentEpisodeIndex = index; // Set the current episode index
      audioSource.src = audioFile;
      audioPlayer.load();
      audioPlayer.play().catch(error => {
        console.error("Playback error:", error);
      });
      episodeTitleElement.textContent = episodeTitle;
      playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';

      audioPlayer.onloadedmetadata = function() {
        seekBar.max = Math.floor(audioPlayer.duration);
      };
      seekBar.value = 0;
    }

    var isPlaying = false;

    playPauseBtn.addEventListener('click', function() {
      if (isPlaying) {
        audioPlayer.pause();
        playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      } else {
        audioPlayer.play().catch(error => {
          console.error("Playback error:", error);
        });
        playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
      }
      isPlaying = !isPlaying;
    });

    audioPlayer.addEventListener('ended', function() {
      playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      isPlaying = false;
      playNextAudio();
    });

    audioPlayer.addEventListener('timeupdate', function() {
      seekBar.value = Math.floor(audioPlayer.currentTime);
    });

    seekBar.addEventListener('input', function() {
      audioPlayer.currentTime = seekBar.value;
    });

    function playNextAudio() {
      currentEpisodeIndex++;
      if (currentEpisodeIndex < episodeCount) {
        playAudio(`${baseGitHubUrl}${folderPath}/${(episodeCount - currentEpisodeIndex)}.mp3`, `Episode ${currentEpisodeIndex + 1}`, currentEpisodeIndex);
      } else {
        currentEpisodeIndex = episodeCount - 1; // Reset to last episode if no more episodes
        playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      }
    }

    // Automatically play the first episode (which is Episode 4 in reverse order) on page load
    window.onload = function() {
      playAudio(`${baseGitHubUrl}${folderPath}/4.mp3`, 'Episode 4', 0); // Start with Episode 4 (highest)
    };
  </script>

</body>
</html>
