<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mytest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgb(202, 202, 202);
        }
        .main_div {
            display: flex;
            flex-wrap: wrap;
            margin: 10px;
            height: 90vh;
        }
        .div_one {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(190, 15, 15, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(40.5px);
            border-radius: 20px;
            padding: 20px;
            margin: 10px;
            flex: 1;
            backdrop-filter: 20px;
            min-width: 200px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            width: 100%;
            height: 120px;
        }
        .div_two {
            display: flex;
            background: rgba(190, 15, 15, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(40.5px);
            border-radius: 20px;
            padding: 0px 10px;
            margin: 20px;
            flex: 2;
            backdrop-filter: 20px;
        }
        .bar {
            display: flex;
            width: 100%;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px;
        }

        .audio-player {
            width: 60%;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .play-pause-button {
            width: 40px;
            height: 40px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 24px;
        }

        .seek-bar {
            width: 100%;
            margin: 10px 0;
        }

        .seek-bar input {
            width: 100%;
            -webkit-appearance: none;
            background: #050505;
            height: 5px;
            border-radius: 5px;
            outline: none;
        }

        .seek-bar input::-webkit-slider-thumb {
            -webkit-appearance: none;
            background: #3f4147;
            height: 15px;
            width: 15px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main_div">
        <!-- Static Music Player Div -->
        <div class="div_one" id="music-player">
            <h6 id="episode-title">Select an Episode</h6>
            <div class="bar">
                <i class="fa-solid fa-backward" id="previousBtn"></i>
                <button class="play-pause-button" id="playPauseBtn"><i class="fa-solid fa-play"></i></button>
                <i class="fa-solid fa-forward" id="nextBtn"></i>
            </div>
            <div class="audio-player">
                <audio id="audio-player">
                    <source id="audio-source" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <div class="seek-bar">
                    <input type="range" id="seekBar" value="0" step="1" min="0" max="100" />
                </div>
            </div>
        </div>
        <div class="div_two">
            <h4>Page Content Goes Here</h4>
        </div>
    </div>

    <script>
        var currentEpisodeIndex = 0;
        var episodeCount = 4;
        var isPlaying = false;
        var baseGitHubUrl = 'https://raw.githubusercontent.com/mithul-mj/mithul-mj.github.io/6faa40ca8b517d639bb7ce463940df9a5a4be224/';
        var folderPath = 'Whispers_of_the_Haunted_Manison';
        var audioPlayer = document.getElementById('audio-player');
        var audioSource = document.getElementById('audio-source');
        var episodeTitleElement = document.getElementById('episode-title');
        var seekBar = document.getElementById('seekBar');
        var playPauseBtn = document.getElementById('playPauseBtn');
        
        // Restore player state from localStorage
        window.onload = function() {
            var savedEpisode = localStorage.getItem('currentEpisodeIndex');
            var savedTime = localStorage.getItem('currentTime');
            var savedIsPlaying = localStorage.getItem('isPlaying');
            currentEpisodeIndex = savedEpisode ? parseInt(savedEpisode) : 0;
            playAudio(`${baseGitHubUrl}${folderPath}/${(episodeCount - currentEpisodeIndex)}.mp3`, `Episode ${currentEpisodeIndex + 1}`, currentEpisodeIndex);

            if (savedTime) {
                audioPlayer.currentTime = parseFloat(savedTime);
            }

            if (savedIsPlaying === 'true') {
                audioPlayer.play();
                playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                isPlaying = true;
            }
        };

        function playAudio(audioFile, episodeTitle, index) {
            currentEpisodeIndex = index;
            audioSource.src = audioFile;
            audioPlayer.load();
            audioPlayer.play().catch(error => {
                console.error("Playback error:", error);
            });
            episodeTitleElement.textContent = episodeTitle;
            playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            isPlaying = true;

            audioPlayer.onloadedmetadata = function() {
                seekBar.max = Math.floor(audioPlayer.duration);
            };
            seekBar.value = 0;

            // Save the current state to localStorage
            localStorage.setItem('currentEpisodeIndex', currentEpisodeIndex);
        }

        playPauseBtn.addEventListener('click', function() {
            if (isPlaying) {
                audioPlayer.pause();
                playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else {
                audioPlayer.play().catch(error => {
                    console.error("Playback error:", error);
                });
                playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            }
            isPlaying = !isPlaying;
            localStorage.setItem('isPlaying', isPlaying);  // Save play/pause state
        });

        audioPlayer.addEventListener('timeupdate', function() {
            seekBar.value = Math.floor(audioPlayer.currentTime);
            localStorage.setItem('currentTime', audioPlayer.currentTime);  // Save current time
        });

        seekBar.addEventListener('input', function() {
            audioPlayer.currentTime = seekBar.value;
        });

        audioPlayer.addEventListener('ended', function() {
            playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            isPlaying = false;
            localStorage.setItem('isPlaying', isPlaying);  // Update play state
        });
    </script>
</body>
</html>
